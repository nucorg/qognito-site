site_name: "Qognito.io | L'Ingénierie de l'Intelligence Physique"
site_description: "L'Ingénierie de l'Intelligence Physique"

# Fichiers CSS personnalisés pour le logo et l'aération
extra_css:
  - stylesheets/extra.css

theme:
  name: material
  custom_dir: overrides
  language: fr
  logo: assets/Qognito_lettre_entier.png
  favicon: assets/Qognito_lettre_entier.png
  palette:
    # Mode sombre (Navy Qognito)
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: amber
    # Mode clair
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: amber
  features:
    - navigation.sections
    - navigation.top

# Couleurs personnalisées pour l'identité de marque
extra:
  colors:
    primary: "#0A1628"  # Bleu Navy profond
    accent: "#D4850F"   # Ambre de sécurité

# Navigation pour un site "Single Page" (One-Page)
# Les ancres doivent correspondre aux slugs générés par MkDocs à partir des titres de index.md
nav:
  - Accueil: index.md
  - "L'Ingénierie Physique":
    - "La Thèse": "#la-preuve"
    - "Les Principes": "#les-principes-de-conception"
  - "Preuves & Cas d'Étude":
    - "Data Pipeline": "#prototype-1-pipeline-de-validation-physique"
    - "Assistant Expert": "#prototype-2-assistant-ia-expert-nucleaire"
    - "Cadrage IA (SaaS RH)": "#cas-detude-cadrage-strategique-ia"
  - "R&D":
    - "PI-VAE": "#pi-vae-donnees-synthetiques-physiquement-coherentes"
  - "Expertise":
    - "Ce que vous vivez": "#ce-que-vous-vivez"
    - "L'Offre": "#loffre-cadrage-prototypage-dataia-sous-contrainte-physique"
    - "L'Encodeur de Contraintes": encodeur.md
    - "Stack Technique": "#stack-technique"
  - FAQ: faq.md
  - Blog: blog.md
